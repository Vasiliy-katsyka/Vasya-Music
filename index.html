<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }
        .glass-player { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(24px); border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="pb-32">

    <!-- PURE HTML AUDIO TAG (NO YOUTUBE IFRAME = ZERO ADS) -->
    <audio id="main-audio"></audio>

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 sticky top-0 bg-[#050505]/90 backdrop-blur-md z-30">
        <h1 class="text-3xl font-extrabold tracking-tight text-white mb-4">Discover Global</h1>
        <!-- Search Bar -->
        <div class="relative">
            <input type="text" id="search-input" placeholder="Search artists, songs, or albums..." class="w-full bg-zinc-900 border border-zinc-800 rounded-xl py-4 pl-12 pr-4 text-white placeholder-zinc-500 focus:outline-none focus:border-blue-500 transition shadow-lg">
            <svg class="w-5 h-5 absolute left-4 top-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
    </div>

    <!-- Main Content Grid -->
    <div class="px-6">
        <div id="section-title" class="text-xl font-bold mb-6 text-white/90">Trending Now</div>
        
        <div id="results-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <div class="col-span-full py-10 text-center text-zinc-500 animate-pulse">Loading global hits...</div>
        </div>
    </div>

    <!-- Floating Player Bar -->
    <div id="player-bar" class="fixed bottom-0 left-0 right-0 glass-player px-4 py-3 md:px-8 md:py-4 flex items-center justify-between z-50 transform translate-y-full transition-transform duration-300">
        
        <div class="flex items-center gap-4 flex-1 min-w-0">
            <img id="p-img" src="" class="w-12 h-12 md:w-14 md:h-14 rounded-lg shadow-lg object-cover bg-zinc-800">
            <div class="truncate">
                <div id="p-title" class="font-bold text-sm md:text-base text-white truncate">Track Title</div>
                <div id="p-artist" class="text-xs md:text-sm text-zinc-400 truncate">Artist</div>
            </div>
        </div>
        
        <div class="flex items-center gap-4 ml-4">
            <!-- Loading Spinner (Hidden by default) -->
            <div id="p-loader" class="hidden w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            
            <!-- Play/Pause Button -->
            <button id="p-play-btn" onclick="togglePlay()" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-xl hover:scale-105 transition-transform">
                <svg id="icon-play" class="w-6 h-6 ml-1 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="icon-pause" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>

        <!-- Progress Bar -->
        <div class="absolute top-0 left-0 right-0 h-[2px] bg-white/10">
            <div id="p-progress" class="h-full bg-blue-500 transition-all duration-100 ease-linear" style="width: 0%"></div>
        </div>
    </div>

    <script>
        // CHANGE TO YOUR CLOUDFLARE WORKER URL
        const WORKER_URL = "https://vasya-music.kviappsgames.workers.dev";
        
        const audio = document.getElementById('main-audio');
        const resultsGrid = document.getElementById('results-grid');
        const searchInput = document.getElementById('search-input');
        const playerBar = document.getElementById('player-bar');
        
        let searchTimeout;

        // Fetch Trending Home Data
        async function loadHome() {
            try {
                const res = await fetch(`${WORKER_URL}/api/home`);
                const items = await res.json();
                renderItems(items);
            } catch (e) {
                resultsGrid.innerHTML = '<div class="col-span-full text-center text-red-500">Failed to load API.</div>';
            }
        }

        // Render HTML Cards
        function renderItems(items) {
            if (!items || items.length === 0) {
                resultsGrid.innerHTML = '<div class="col-span-full text-center text-zinc-500">No results found.</div>';
                return;
            }

            resultsGrid.innerHTML = items.map(item => `
                <div class="group cursor-pointer hover:bg-zinc-900/50 p-2 -m-2 rounded-xl transition" 
                     onclick="playSong('${item.id}', '${item.title.replace(/'/g, "\\'")}', '${item.artist.replace(/'/g, "\\'")}', '${item.thumbnail}')">
                    <div class="relative aspect-square mb-3">
                        <img src="${item.thumbnail}" class="w-full h-full object-cover rounded-xl shadow-md group-hover:shadow-blue-500/20 transition duration-300">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center rounded-xl">
                            <div class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center shadow-lg transform translate-y-2 group-hover:translate-y-0 transition-all">
                                <svg class="w-5 h-5 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                    </div>
                    <div class="text-sm font-bold truncate text-white">${item.title}</div>
                    <div class="text-xs text-zinc-400 truncate mt-0.5">${item.artist}</div>
                </div>
            `).join('');
        }

        // Search Bar Event Listener
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const q = e.target.value.trim();
            if (!q) {
                document.getElementById('section-title').innerText = "Trending Now";
                loadHome();
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                document.getElementById('section-title').innerText = `Results for "${q}"`;
                resultsGrid.innerHTML = `<div class="col-span-full py-10 text-center text-zinc-500 animate-pulse">Searching global library...</div>`;
                
                try {
                    const res = await fetch(`${WORKER_URL}/api/search?q=${encodeURIComponent(q)}`);
                    const items = await res.json();
                    renderItems(items);
                } catch(err) {
                    resultsGrid.innerHTML = `<div class="col-span-full text-center text-red-500">Search failed.</div>`;
                }
            }, 600);
        });

        // Toggle Icons
        function setIcon(state) {
            document.getElementById('icon-play').classList.add('hidden');
            document.getElementById('icon-pause').classList.add('hidden');
            document.getElementById('p-play-btn').classList.remove('hidden');
            document.getElementById('p-loader').classList.add('hidden');

            if (state === 'loading') {
                document.getElementById('p-play-btn').classList.add('hidden');
                document.getElementById('p-loader').classList.remove('hidden');
            } else if (state === 'play') {
                document.getElementById('icon-play').classList.remove('hidden');
            } else if (state === 'pause') {
                document.getElementById('icon-pause').classList.remove('hidden');
            }
        }

        // Play Audio securely via Cloudflare Worker
        async function playSong(id, title, artist, thumb) {
            playerBar.classList.remove('translate-y-full'); // Reveal player
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-img').src = thumb;
            
            setIcon('loading');

            try {
                // Fetch direct secure audio stream URL (No iFrames)
                const res = await fetch(`${WORKER_URL}/api/stream?id=${id}`);
                const data = await res.json();
                
                if (data.url) {
                    audio.src = data.url;
                    audio.play();
                    
                    // Log to Database silently
                    fetch(`${WORKER_URL}/api/db/play`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, title, artist, thumbnail: thumb })
                    });
                } else {
                    alert("Stream blocked. Please try another song.");
                    setIcon('play');
                }
            } catch (err) {
                alert("Failed to get audio. Server might be busy.");
                setIcon('play');
            }
        }

        // Play/Pause Click Handler
        function togglePlay() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        // Audio Event Listeners to Sync UI
        audio.addEventListener('play', () => setIcon('pause'));
        audio.addEventListener('pause', () => setIcon('play'));
        audio.addEventListener('ended', () => setIcon('play'));
        
        // Progress Bar
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const prog = (audio.currentTime / audio.duration) * 100;
                document.getElementById('p-progress').style.width = prog + "%";
            }
        });

        // Boot
        loadHome();
    </script>
</body>
</html>
