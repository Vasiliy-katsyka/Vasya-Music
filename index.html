<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vasya Global Music</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(30px); border-top: 1px solid rgba(255,255,255,0.1); }
        .song-card:active { transform: scale(0.96); transition: 0.2s; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <div class="p-6 pt-12">
        <h1 class="text-4xl font-extrabold tracking-tighter text-white">Browse</h1>
        <p class="text-zinc-500 font-semibold">Global Hits & New Releases</p>
    </div>

    <!-- Search Bar -->
    <div class="px-6 mb-8">
        <div class="relative">
            <input type="text" id="search-input" placeholder="Artists, Songs, Lyrics..." class="w-full bg-zinc-900 border-none rounded-2xl py-4 pl-12 pr-4 text-white placeholder-zinc-500 focus:ring-2 focus:ring-blue-500">
            <svg class="w-6 h-6 absolute left-4 top-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-view" class="px-6">
        <div id="section-title" class="text-xl font-bold mb-4">Trending Now</div>
        <div id="results-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <!-- Items injected here -->
        </div>
    </div>

    <!-- Player Bar -->
    <div id="player-bar" class="fixed bottom-0 left-0 right-0 glass px-6 py-4 flex items-center justify-between z-50 hidden">
        <div class="flex items-center gap-4 flex-1 truncate">
            <img id="p-img" src="" class="w-14 h-14 rounded-xl shadow-lg object-cover">
            <div class="truncate">
                <div id="p-title" class="font-bold text-sm truncate">Track Title</div>
                <div id="p-artist" class="text-xs text-zinc-400 truncate">Artist</div>
            </div>
        </div>
        
        <button id="p-play-btn" onclick="togglePlay()" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-xl">
            <svg id="p-icon" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <div class="absolute top-0 left-0 h-1 bg-blue-500 transition-all" id="p-progress" style="width: 0%"></div>
    </div>

    <!-- Audio Element -->
    <audio id="main-audio"></audio>

    <script>
        const WORKER_URL = "https://vasya-music.kviappsgames.workers.dev"; // UPDATE THIS
        const audio = document.getElementById('main-audio');
        const resultsGrid = document.getElementById('results-grid');
        const searchInput = document.getElementById('search-input');

        // Initial Home Load
        async function loadHome() {
            const res = await fetch(`${WORKER_URL}/api/home`);
            const items = await res.json();
            renderItems(items);
        }

        function renderItems(items) {
            resultsGrid.innerHTML = items.map(item => `
                <div class="song-card cursor-pointer" onclick="playSong('${item.id}', '${item.title.replace(/'/g, "")}', '${item.artist.replace(/'/g, "")}', '${item.thumbnail}')">
                    <div class="relative aspect-square mb-2">
                        <img src="${item.thumbnail}" class="w-full h-full object-cover rounded-2xl">
                        <div class="absolute bottom-2 right-2 w-8 h-8 bg-black/20 backdrop-blur-md rounded-full flex items-center justify-center">
                            <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div class="text-sm font-bold truncate">${item.title}</div>
                    <div class="text-xs text-zinc-500 truncate">${item.artist}</div>
                </div>
            `).join('');
        }

        // Search Logic
        searchInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const q = e.target.value;
                document.getElementById('section-title').innerText = `Results for "${q}"`;
                resultsGrid.innerHTML = `<div class="col-span-full py-10 text-center text-zinc-500 animate-pulse">Searching global library...</div>`;
                
                const res = await fetch(`${WORKER_URL}/api/search?q=${encodeURIComponent(q)}`);
                const items = await res.json();
                renderItems(items);
            }
        });

        // Player Logic
        async function playSong(id, title, artist, thumb) {
            document.getElementById('player-bar').classList.remove('hidden');
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-img').src = thumb;
            document.getElementById('p-icon').innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`; // Pause icon

            // Get Stream
            const res = await fetch(`${WORKER_URL}/api/stream?id=${id}`);
            const data = await res.json();
            
            if (data.url) {
                audio.src = data.url;
                audio.play();
                // Save to DB
                fetch(`${WORKER_URL}/api/db/play`, {
                    method: 'POST',
                    body: JSON.stringify({ id, title, artist, thumbnail: thumb })
                });
            }
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                document.getElementById('p-icon').innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
            } else {
                audio.pause();
                document.getElementById('p-icon').innerHTML = `<path d="M8 5v14l11-7z"/>`;
            }
        }

        audio.ontimeupdate = () => {
            const prog = (audio.currentTime / audio.duration) * 100;
            document.getElementById('p-progress').style.width = prog + "%";
        };

        loadHome();
    </script>
</body>
</html>
