<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vasya Ad-Free Music</title>
    <style>
        :root { --bg: #000; --card: #1a1a1c; --accent: #3b82f6; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; padding-bottom: 120px; }
        
        /* Layout */
        header { padding: 40px 20px 20px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        /* Search */
        .search-box { padding: 0 20px; }
        input { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            background: #222; color: #fff; font-size: 16px; outline: none;
        }

        /* Cards */
        .card { cursor: pointer; background: var(--card); border-radius: 15px; overflow: hidden; transition: 0.2s; }
        .card:active { transform: scale(0.96); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 10px; }
        .title { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist { font-size: 12px; color: #aaa; margin-top: 4px; }

        /* Ad-Free Player */
        .player {
            position: fixed; bottom: 0; width: 100%; background: rgba(15,15,15,0.95);
            backdrop-filter: blur(20px); border-top: 1px solid #333;
            padding: 15px 20px; display: flex; align-items: center; box-sizing: border-box;
            visibility: hidden; z-index: 1000;
        }
        .player.active { visibility: visible; }
        .p-img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; }
        .p-info { flex: 1; min-width: 0; }
        .p-btn { 
            background: #fff; border: none; width: 45px; height: 45px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .progress { position: absolute; top: 0; left: 0; height: 2px; background: var(--accent); width: 0%; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0; font-size: 32px;">Ad-Free Global</h1>
        <p style="color:#777; margin: 5px 0 0;">YouTube Music without the garbage</p>
    </header>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="Search global artists or songs...">
    </div>

    <div id="results-grid" class="grid">
        <div style="color: #555;">Loading trending...</div>
    </div>

    <div id="player-bar" class="player">
        <div id="progress" class="progress"></div>
        <img id="p-img" class="p-img" src="">
        <div class="p-info">
            <div id="p-title" class="title">Song</div>
            <div id="p-artist" class="artist">Artist</div>
        </div>
        <button class="p-btn" onclick="togglePlay()">
            <svg id="p-icon" width="20" height="20" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
    </div>

    <audio id="audio"></audio>

    <script>
        const WORKER_URL = "https://vasya-music.kviappsgames.workers.dev"; // UPDATE THIS
        const audio = document.getElementById('audio');
        const grid = document.getElementById('results-grid');

        async function loadHome() {
            const res = await fetch(`${WORKER_URL}/api/home`);
            const data = await res.json();
            render(data);
        }

        function render(items) {
            grid.innerHTML = items.map(item => `
                <div class="card" onclick="playSong('${item.id}', '${item.title.replace(/'/g,"")}', '${item.artist.replace(/'/g,"")}', '${item.thumbnail}')">
                    <img src="${item.thumbnail}">
                    <div class="card-info">
                        <div class="title">${item.title}</div>
                        <div class="artist">${item.artist}</div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('search-input').onkeypress = async (e) => {
            if (e.key === 'Enter') {
                grid.innerHTML = '<div style="color:#555;">Searching global library...</div>';
                const res = await fetch(`${WORKER_URL}/api/search?q=${encodeURIComponent(e.target.value)}`);
                const data = await res.json();
                render(data);
            }
        };

        async function playSong(id, title, artist, thumb) {
            document.getElementById('player-bar').classList.add('active');
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-img').src = thumb;

            // Fetch the ad-free direct stream
            const res = await fetch(`${WORKER_URL}/api/stream?id=${id}`);
            const data = await res.json();
            
            if (data.url) {
                audio.src = data.url;
                audio.play();
                document.getElementById('p-icon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            }
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                document.getElementById('p-icon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                audio.pause();
                document.getElementById('p-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
        }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress').style.width = p + "%";
        };

        loadHome();
    </script>
</body>
</html>
