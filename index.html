<!DOCTYPE html>

        tailwind.config = {

        /* Smooth Gradient Text */
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(90deg, #60a5fa, #a78bfa);

    <script>
        // CHANGE THIS TO YOUR CLOUDFLARE WORKER URL
        const WORKER_URL = "https://vasya-music.kviappsgames.workers.dev";
        const audio = document.getElementById('audio-element');
        let isPlaying = false;

        // ROUTING
        function nav(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            if(viewId === 'home' || viewId === 'profile') loadDbStats();
        }

        // LOAD STATS FROM D1
        async function loadDbStats() {
            try {
                const res = await fetch(`${WORKER_URL}/api/db/stats`);
                const data = await res.json();
                
                document.getElementById('stat-total').innerText = data.recent.length + data.top.length; // Simplified total
                
                const renderCard = (item) => `
                    <div class="bg-zinc-900/50 p-3 rounded-xl hover:bg-zinc-800 transition cursor-pointer group" onclick="playSong('${item.stream_id}', '${item.title.replace(/'/g, "\\'")}', '${item.artist.replace(/'/g, "\\'")}', '${item.thumbnail}')">
                        <div class="relative w-full aspect-square mb-3">
                            <img src="${item.thumbnail}" class="w-full h-full object-cover rounded-lg shadow-md group-hover:shadow-blue-500/20 transition">
                            <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition rounded-lg">▶</div>
                        </div>
                        <div class="font-bold text-sm truncate">${item.title}</div>
                        <div class="text-xs text-zinc-400 truncate">${item.artist}</div>
                    </div>`;

                document.getElementById('home-recent').innerHTML = data.recent.map(renderCard).join('');
                document.getElementById('home-top').innerHTML = data.top.map(renderCard).join('');
            } catch (e) { console.log("DB Stats Error (Maybe Worker not setup yet?)", e); }
        }

        // A helper function to handle fetch and log debug info
        async function apiFetch(endpoint) {
            console.log(`%c[Request] %c${endpoint}`, "color: blue; font-weight: bold", "color: gray");
            try {
                const res = await fetch(`${WORKER_URL}${endpoint}`);
                const data = await res.json();
                
                if (data.error) {
                    console.error(`%c[Worker Error]`, "color: red; font-weight: bold", data.error);
                    console.table(data._debug);
                    return null;
                }
        
                console.log(`%c[Response Success]`, "color: green; font-weight: bold", {
                    instance: data._debug?.upstream,
                    status: data._debug?.status,
                    results: data.items ? data.items.length : 'N/A'
                });
                
                return data;
            } catch (err) {
                console.error("%c[Network/CORS Error] %cCheck if WORKER_URL is correct and CORS is enabled.", "color: red; font-weight: bold", "color: white");
                return null;
            }
        }
        
        async function doSearch(query) {
            if(!query) return;
            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = '<div class="text-center text-zinc-500 py-10">Searching global library...</div>';
            
            const data = await apiFetch(`/api/search?q=${encodeURIComponent(query)}`);
            if (!data || !data.items) {
                resultsDiv.innerHTML = '<div class="text-center text-red-500 py-10">Search failed. Check F12 console.</div>';
                return;
            }
            
            renderSearchResults(data.items);
        }


        // ARTIST POPUP LOGIC (Using iTunes API for clean discography)
        async function openArtist(name) {
            const modal = document.getElementById('artist-modal');
            document.getElementById('modal-artist-name').innerText = name;
            document.getElementById('modal-albums').innerHTML = '<div class="text-zinc-500 animate-pulse">Loading discography...</div>';
            modal.classList.remove('translate-y-full');

            // iTunes API doesn't need CORS/Worker
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(name)}&entity=album&limit=20`);
            const data = await res.json();
            
            document.getElementById('modal-albums').innerHTML = data.results.map(album => `
                <div class="bg-zinc-900 p-3 rounded-xl cursor-pointer hover:bg-zinc-800 transition" onclick="playAlbumTrack('${name}', '${album.collectionName.replace(/'/g, "\\'")}', '${album.artworkUrl100.replace('100x100', '600x600')}')">
                    <img src="${album.artworkUrl100.replace('100x100', '600x600')}" class="w-full aspect-square object-cover rounded-lg mb-2">
                    <div class="font-bold text-sm truncate">${album.collectionName}</div>
                    <div class="text-xs text-zinc-400">${album.releaseDate.substring(0,4)}</div>
                </div>
            `).join('');
        }

        function closeArtist() { document.getElementById('artist-modal').classList.add('translate-y-full'); }

        // MAPPING ITUNES ALBUM TO PIPED STREAM
        async function playAlbumTrack(artist, album, artwork) {
            document.getElementById('modal-albums').innerHTML = '<div class="text-blue-400 animate-pulse">Finding official audio...</div>';
            const query = `${artist} ${album}`;
            
            try {
                const res = await fetch(`${WORKER_URL}/api/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                // SAFETY CHECK: Ensure data and data.items exist before trying to play!
                if (data && data.items && data.items.length > 0) {
                    const topTrack = data.items[0];
                    const streamId = topTrack.url.split('=')[1];
                    playSong(streamId, topTrack.title, artist, artwork);
                    closeArtist();
                } else {
                    alert("Could not find audio streams for this album.");
                    closeArtist();
                }
            } catch (err) {
                console.error("Album search failed:", err);
                alert("Search failed. Check F12 console.");
                closeArtist();
            }
        }

        // PLAYBACK LOGIC
        async function playSong(streamId, title, artist, thumbnail) {
            // UI Updates...
            document.getElementById('player-title').innerText = title;
            document.getElementById('player-artist').innerText = artist;
            document.getElementById('play-btn').innerText = '⏳';
        
            const data = await apiFetch(`/api/stream?id=${streamId}`);
            
            if (data && data.url) {
                audio.src = data.url;
                audio.play().catch(e => console.error("Playback failed:", e));
                document.getElementById('play-btn').innerText = '⏸';
                
                // Log to DB
                fetch(`${WORKER_URL}/api/db/play`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ title, artist, thumbnail, stream_id: streamId })
                });
            } else {
                alert("Failed to get audio stream. Try another song.");
                document.getElementById('play-btn').innerText = '▶';
            }
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('play-btn').innerText = '⏸'; isPlaying = true; } 
            else { audio.pause(); document.getElementById('play-btn').innerText = '▶'; isPlaying = false; }
        }

        audio.addEventListener('ended', () => { document.getElementById('play-btn').innerText = '▶'; isPlaying = false; });

        // Initialize Home Data
        loadDbStats();
    </script>
