<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vasya Music</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; overscroll-behavior-y: none; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans antialiased pb-32">

    <!-- TOP GRADIENT -->
    <div class="fixed top-0 left-0 w-full h-64 bg-gradient-to-b from-blue-900/40 to-zinc-950 pointer-events-none -z-10"></div>

    <!-- MAIN APP CONTAINER -->
    <div id="app" class="p-4 md:p-8 max-w-7xl mx-auto">
        
        <!-- HEADER -->
        <header class="flex justify-between items-center mb-8 pt-4">
            <h1 class="text-3xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Vasya Music</h1>
            <div id="user-avatar" class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-full flex items-center justify-center font-bold text-lg shadow-lg">V</div>
        </header>

        <!-- VIEWS -->
        <main id="view-home" class="view-section">
            <h2 class="text-xl font-bold mb-4">Your Artists</h2>
            <div class="flex gap-3 mb-8 overflow-x-auto pb-2 snap-x">
                <button onclick="openArtist('Hans Zimmer')" class="snap-start shrink-0 bg-zinc-900/80 hover:bg-zinc-800 px-6 py-3 rounded-full border border-zinc-800 transition">Hans Zimmer</button>
                <button onclick="openArtist('Coldplay')" class="snap-start shrink-0 bg-zinc-900/80 hover:bg-zinc-800 px-6 py-3 rounded-full border border-zinc-800 transition">Coldplay</button>
                <button onclick="openArtist('Ed Sheeran')" class="snap-start shrink-0 bg-zinc-900/80 hover:bg-zinc-800 px-6 py-3 rounded-full border border-zinc-800 transition">Ed Sheeran</button>
                <button onclick="openArtist('Myles Smith')" class="snap-start shrink-0 bg-zinc-900/80 hover:bg-zinc-800 px-6 py-3 rounded-full border border-zinc-800 transition">Myles Smith</button>
                <button onclick="openArtist('Alex Warren')" class="snap-start shrink-0 bg-zinc-900/80 hover:bg-zinc-800 px-6 py-3 rounded-full border border-zinc-800 transition">Alex Warren</button>
            </div>

            <h2 class="text-xl font-bold mb-4">Jump Back In (Recent)</h2>
            <div id="home-recent" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-8"></div>
            
            <h2 class="text-xl font-bold mb-4">Top Listened</h2>
            <div id="home-top" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-8"></div>
        </main>

        <main id="view-search" class="view-section hidden">
            <input type="text" id="searchInput" placeholder="Search songs, artists..." class="w-full bg-zinc-900 border border-zinc-800 text-white rounded-xl px-5 py-4 focus:outline-none focus:border-blue-500 transition shadow-inner mb-6" onchange="doSearch(this.value)">
            <div id="search-results" class="space-y-2"></div>
        </main>

        <main id="view-profile" class="view-section hidden">
            <h2 class="text-2xl font-bold mb-6">Your Stats</h2>
            <div class="bg-zinc-900 rounded-2xl p-6 border border-zinc-800 mb-6 flex gap-6 items-center">
                <div class="text-center">
                    <div class="text-4xl font-bold text-blue-400" id="stat-total">0</div>
                    <div class="text-zinc-400 text-sm uppercase tracking-widest mt-1">Total Plays</div>
                </div>
            </div>
        </main>

        <main id="view-playlists" class="view-section hidden">
            <h2 class="text-2xl font-bold mb-6">Playlists</h2>
            <button class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold mb-4 transition">Create New Playlist</button>
            <div class="text-zinc-500 text-center py-10">Playlists coming soon...</div>
        </main>

    </div>

    <!-- ARTIST POPUP MODAL -->
    <div id="artist-modal" class="fixed inset-0 z-50 bg-zinc-950/95 transform translate-y-full transition-transform duration-300 overflow-y-auto">
        <div class="p-4 md:p-8 max-w-5xl mx-auto mt-10">
            <button onclick="closeArtist()" class="bg-zinc-800 p-2 rounded-full mb-6">✕ Back</button>
            <h2 id="modal-artist-name" class="text-4xl font-bold mb-8">Artist</h2>
            <h3 class="text-xl font-bold mb-4">Albums & Singles</h3>
            <div id="modal-albums" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </div>

    <!-- MINI PLAYER -->
    <div class="fixed bottom-16 md:bottom-0 left-0 w-full glass border-t border-zinc-800/50 p-3 z-40">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3 overflow-hidden w-1/2">
                <img id="player-img" src="https://via.placeholder.com/150/18181b/ffffff?text=VM" class="w-12 h-12 rounded-md shadow-lg object-cover">
                <div class="truncate">
                    <div id="player-title" class="font-bold text-sm truncate">Not Playing</div>
                    <div id="player-artist" class="text-xs text-zinc-400 truncate">--</div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <audio id="audio-element" class="hidden"></audio>
                <button onclick="togglePlay()" id="play-btn" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition">
                    ▶
                </button>
            </div>
        </div>
    </div>

    <!-- BOTTOM MOBILE NAVIGATION -->
    <nav class="fixed bottom-0 left-0 w-full bg-zinc-950 border-t border-zinc-900 flex justify-around p-3 md:hidden z-30 pb-safe">
        <button onclick="nav('home')" class="flex flex-col items-center text-zinc-400 focus:text-white"><span class="text-xl">🏠</span><span class="text-[10px]">Home</span></button>
        <button onclick="nav('search')" class="flex flex-col items-center text-zinc-400 focus:text-white"><span class="text-xl">🔍</span><span class="text-[10px]">Search</span></button>
        <button onclick="nav('playlists')" class="flex flex-col items-center text-zinc-400 focus:text-white"><span class="text-xl">📚</span><span class="text-[10px]">Library</span></button>
        <button onclick="nav('profile')" class="flex flex-col items-center text-zinc-400 focus:text-white"><span class="text-xl">👤</span><span class="text-[10px]">Profile</span></button>
    </nav>
    
    <!-- DESKTOP NAVIGATION -->
    <nav class="hidden md:flex fixed top-0 right-0 p-8 gap-8">
        <button onclick="nav('home')" class="hover:text-blue-400 font-bold transition">Home</button>
        <button onclick="nav('search')" class="hover:text-blue-400 font-bold transition">Search</button>
        <button onclick="nav('playlists')" class="hover:text-blue-400 font-bold transition">Library</button>
        <button onclick="nav('profile')" class="hover:text-blue-400 font-bold transition">Profile</button>
    </nav>

    <script>
        // CHANGE THIS TO YOUR CLOUDFLARE WORKER URL
        const WORKER_URL = "https://vasya-music.kviappsgames.workers.dev";
        const audio = document.getElementById('audio-element');
        let isPlaying = false;

        // ROUTING
        function nav(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            if(viewId === 'home' || viewId === 'profile') loadDbStats();
        }

        // LOAD STATS FROM D1
        async function loadDbStats() {
            try {
                const res = await fetch(`${WORKER_URL}/api/db/stats`);
                const data = await res.json();
                
                document.getElementById('stat-total').innerText = data.recent.length + data.top.length; // Simplified total
                
                const renderCard = (item) => `
                    <div class="bg-zinc-900/50 p-3 rounded-xl hover:bg-zinc-800 transition cursor-pointer group" onclick="playSong('${item.stream_id}', '${item.title.replace(/'/g, "\\'")}', '${item.artist.replace(/'/g, "\\'")}', '${item.thumbnail}')">
                        <div class="relative w-full aspect-square mb-3">
                            <img src="${item.thumbnail}" class="w-full h-full object-cover rounded-lg shadow-md group-hover:shadow-blue-500/20 transition">
                            <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition rounded-lg">▶</div>
                        </div>
                        <div class="font-bold text-sm truncate">${item.title}</div>
                        <div class="text-xs text-zinc-400 truncate">${item.artist}</div>
                    </div>`;

                document.getElementById('home-recent').innerHTML = data.recent.map(renderCard).join('');
                document.getElementById('home-top').innerHTML = data.top.map(renderCard).join('');
            } catch (e) { console.log("DB Stats Error (Maybe Worker not setup yet?)", e); }
        }

        // A helper function to handle fetch and log debug info
        async function apiFetch(endpoint) {
            console.log(`%c[Request] %c${endpoint}`, "color: blue; font-weight: bold", "color: gray");
            try {
                const res = await fetch(`${WORKER_URL}${endpoint}`);
                const data = await res.json();
                
                if (data.error) {
                    console.error(`%c[Worker Error]`, "color: red; font-weight: bold", data.error);
                    console.table(data._debug);
                    return null;
                }
        
                console.log(`%c[Response Success]`, "color: green; font-weight: bold", {
                    instance: data._debug?.upstream,
                    status: data._debug?.status,
                    results: data.items ? data.items.length : 'N/A'
                });
                
                return data;
            } catch (err) {
                console.error("%c[Network/CORS Error] %cCheck if WORKER_URL is correct and CORS is enabled.", "color: red; font-weight: bold", "color: white");
                return null;
            }
        }
        
        async function doSearch(query) {
            if(!query) return;
            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = '<div class="text-center text-zinc-500 py-10">Searching global library...</div>';
            
            const data = await apiFetch(`/api/search?q=${encodeURIComponent(query)}`);
            if (!data || !data.items) {
                resultsDiv.innerHTML = '<div class="text-center text-red-500 py-10">Search failed. Check F12 console.</div>';
                return;
            }
            
            renderSearchResults(data.items);
        }


        // ARTIST POPUP LOGIC (Using iTunes API for clean discography)
        async function openArtist(name) {
            const modal = document.getElementById('artist-modal');
            document.getElementById('modal-artist-name').innerText = name;
            document.getElementById('modal-albums').innerHTML = '<div class="text-zinc-500 animate-pulse">Loading discography...</div>';
            modal.classList.remove('translate-y-full');

            // iTunes API doesn't need CORS/Worker
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(name)}&entity=album&limit=20`);
            const data = await res.json();
            
            document.getElementById('modal-albums').innerHTML = data.results.map(album => `
                <div class="bg-zinc-900 p-3 rounded-xl cursor-pointer hover:bg-zinc-800 transition" onclick="playAlbumTrack('${name}', '${album.collectionName.replace(/'/g, "\\'")}', '${album.artworkUrl100.replace('100x100', '600x600')}')">
                    <img src="${album.artworkUrl100.replace('100x100', '600x600')}" class="w-full aspect-square object-cover rounded-lg mb-2">
                    <div class="font-bold text-sm truncate">${album.collectionName}</div>
                    <div class="text-xs text-zinc-400">${album.releaseDate.substring(0,4)}</div>
                </div>
            `).join('');
        }

        function closeArtist() { document.getElementById('artist-modal').classList.add('translate-y-full'); }

        // MAPPING ITUNES ALBUM TO PIPED STREAM
        async function playAlbumTrack(artist, album, artwork) {
            document.getElementById('modal-albums').innerHTML = '<div class="text-blue-400 animate-pulse">Finding official audio...</div>';
            const query = `${artist} ${album}`;
            
            try {
                const res = await fetch(`${WORKER_URL}/api/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                // SAFETY CHECK: Ensure data and data.items exist before trying to play!
                if (data && data.items && data.items.length > 0) {
                    const topTrack = data.items[0];
                    const streamId = topTrack.url.split('=')[1];
                    playSong(streamId, topTrack.title, artist, artwork);
                    closeArtist();
                } else {
                    alert("Could not find audio streams for this album.");
                    closeArtist();
                }
            } catch (err) {
                console.error("Album search failed:", err);
                alert("Search failed. Check F12 console.");
                closeArtist();
            }
        }

        // PLAYBACK LOGIC
        async function playSong(streamId, title, artist, thumbnail) {
            // UI Updates...
            document.getElementById('player-title').innerText = title;
            document.getElementById('player-artist').innerText = artist;
            document.getElementById('play-btn').innerText = '⏳';
        
            const data = await apiFetch(`/api/stream?id=${streamId}`);
            
            if (data && data.url) {
                audio.src = data.url;
                audio.play().catch(e => console.error("Playback failed:", e));
                document.getElementById('play-btn').innerText = '⏸';
                
                // Log to DB
                fetch(`${WORKER_URL}/api/db/play`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ title, artist, thumbnail, stream_id: streamId })
                });
            } else {
                alert("Failed to get audio stream. Try another song.");
                document.getElementById('play-btn').innerText = '▶';
            }
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('play-btn').innerText = '⏸'; isPlaying = true; } 
            else { audio.pause(); document.getElementById('play-btn').innerText = '▶'; isPlaying = false; }
        }

        audio.addEventListener('ended', () => { document.getElementById('play-btn').innerText = '▶'; isPlaying = false; });

        // Initialize Home Data
        loadDbStats();
    </script>
</body>
</html>
